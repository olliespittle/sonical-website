<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Sonical — Coming soon</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#0c0708;--ink:#fbf3ea;--muted:#d3c2b4;--faint:#9c8878;
    --text-acc:#ff9e00;--graph-acc:#c084fc;--graph-line:rgba(192,132,252,.3);--graph-soft:rgba(192,132,252,.1);
    --btn-grad:linear-gradient(90deg,#a855f7 0%,#a855f7 25%,#ff8a00 75%,#ff8a00 100%);
    --font-display:'Space Grotesk',system-ui,sans-serif;--font-body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;background:var(--bg-0);color:var(--ink);font-family:var(--font-body);
    display:flex;align-items:center;justify-content:center;padding:96px 32px 48px;position:relative;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .nebula{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(60% 50% at 78% -8%, rgba(124,45,18,.55), transparent 62%),
      radial-gradient(46% 40% at 10% 64%, rgba(255,158,0,.14), transparent 60%),
      radial-gradient(72% 60% at 50% 112%, rgba(107,33,168,.55), transparent 65%);
  }

  /* ============ Nav — matched to the homepage header ============ */
  .site-nav{
    position:fixed;top:0;left:0;right:0;z-index:50;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    background:rgba(12,7,8,.55);border-bottom:1px solid var(--graph-line);
  }
  .nav-inner{
    max-width:1240px;margin:0 auto;padding:0 22px;height:64px;
    display:flex;align-items:center;justify-content:space-between;gap:14px;
  }
  .logo{display:inline-flex;align-items:center;color:var(--ink);text-decoration:none}
  .logo img{height:28px;width:auto;display:block}
  .nav-links{display:flex;align-items:center;gap:6px;list-style:none}
  .nav-links a{
    background:none;cursor:pointer;white-space:nowrap;text-decoration:none;
    color:var(--muted);font-family:var(--font-display);font-size:13.5px;font-weight:500;
    padding:8px 15px;border-radius:999px;border:1px solid transparent;
    transition:color .2s,border-color .2s,background .2s;
  }
  .nav-links a:hover{color:var(--ink)}
  .nav-links a.active{color:var(--text-acc);border-color:var(--graph-line);background:var(--graph-soft)}
  @media(max-width:760px){.nav-links a{font-size:12px;padding:7px 11px}}

  /* hamburger — hidden on desktop, collapses the 4-item nav on phones */
  .nav-toggle{
    display:none;background:none;border:1px solid var(--graph-line);
    border-radius:10px;width:40px;height:36px;cursor:pointer;padding:0;
    flex-direction:column;align-items:center;justify-content:center;gap:4px;
  }
  .nav-toggle span{display:block;width:18px;height:2px;background:var(--ink);border-radius:2px;transition:transform .2s,opacity .2s}
  .site-nav.nav-open .nav-toggle span:nth-child(1){transform:translateY(6px) rotate(45deg)}
  .site-nav.nav-open .nav-toggle span:nth-child(2){opacity:0}
  .site-nav.nav-open .nav-toggle span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
  @media(max-width:600px){
    .nav-inner{position:relative}
    .nav-toggle{display:flex}
    .nav-links{
      position:absolute;top:calc(100% + 10px);right:0;min-width:210px;
      flex-direction:column;align-items:stretch;gap:4px;display:none;
      background:rgba(20,12,10,.98);border:1px solid var(--graph-line);
      border-radius:14px;padding:8px;box-shadow:0 14px 34px rgba(0,0,0,.5);
    }
    .site-nav.nav-open .nav-links{display:flex}
    .nav-links a{font-size:14px;padding:11px 14px}
  }

  .wrap{position:relative;z-index:1;text-align:center;max-width:560px}
  .eyebrow{
    font-family:var(--font-display);font-size:13px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
    color:var(--graph-acc);display:inline-flex;align-items:center;gap:11px;margin-bottom:18px;
  }
  .eyebrow::before{content:"";width:28px;height:2px;background:var(--graph-acc)}
  h1{font-family:var(--font-display);font-weight:700;letter-spacing:-.02em;line-height:1.08;font-size:clamp(34px,6vw,56px);margin-bottom:18px}
  h1 .acc{color:var(--text-acc)}
  p{color:var(--muted);font-size:clamp(15px,1.7vw,18px);line-height:1.6;max-width:46ch;margin:0 auto 32px}
  .btn{
    display:inline-flex;align-items:center;gap:8px;font-family:var(--font-display);font-weight:600;font-size:15px;
    padding:13px 28px;border-radius:999px;text-decoration:none;cursor:pointer;border:0;
    background:var(--btn-grad);color:#140a04;transition:transform .25s ease,box-shadow .25s ease;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(255,138,0,.3)}

  /* ============ Alien building-site scene ============ */
  .scene{width:min(420px,82vw);margin:6px auto 26px}
  .scene svg{display:block;width:100%;height:auto;overflow:visible}
  .scene .body{fill:url(#alienGrad);stroke:#4c1d95;stroke-width:2}
  .scene .belly{fill:#fff;opacity:.10}
  .scene .foot{fill:url(#alienGrad);stroke:#4c1d95;stroke-width:2}
  .scene .arm{fill:none;stroke:#9333ea;stroke-width:6.5;stroke-linecap:round}
  .scene .hand{fill:#9333ea;stroke:#4c1d95;stroke-width:1.5}
  .scene .eye-white{fill:#fbf3ea}
  .scene .eye-pupil{fill:#241033}
  .scene .eye-glint{fill:#fff}
  .scene .mouth{fill:none;stroke:#3a1d52;stroke-width:2;stroke-linecap:round}
  .scene .ant{fill:none;stroke:#a855f7;stroke-width:2.4;stroke-linecap:round}
  .scene .ant-halo{fill:var(--text-acc);opacity:.25}
  .scene .ant-bulb{fill:var(--text-acc)}
  .scene .twk{fill:var(--ink)}
  .scene .ground{stroke:var(--graph-line);stroke-width:2;stroke-dasharray:4 8}
  /* hearing protection (ear defenders) */
  .scene .ed-band{fill:none;stroke:#3a1d52;stroke-width:3;stroke-linecap:round}
  .scene .ed-cup{fill:#ff9e00;stroke:#a85f00;stroke-width:1.6}
  .scene .ed-foam{fill:#6b3b00}
  .scene .brick{fill:var(--graph-soft);stroke:var(--graph-acc);stroke-width:1.5}
  .scene .brick.lit{fill:rgba(255,158,0,.18)}
  .scene .brick.ghost{fill:none;stroke:var(--graph-acc);stroke-dasharray:3 5;opacity:.5}
  .scene .ufo-dome{fill:rgba(255,158,0,.22);stroke:var(--text-acc);stroke-width:1.6}
  .scene .ufo-body{fill:rgba(168,85,247,.4);stroke:var(--graph-acc);stroke-width:1.6}
  .scene .ufo-light{fill:var(--text-acc)}
  .scene .beam{fill:var(--text-acc);opacity:.25}
  .scene .beam-bar{fill:rgba(255,158,0,.5);stroke:var(--text-acc);stroke-width:1.4}
  .scene .plank{fill:rgba(168,85,247,.25);stroke:var(--graph-acc);stroke-width:1.4}
  .scene .nail{stroke:#cdb9a6;stroke-width:2.4;stroke-linecap:round}
  .scene .nail-head{fill:#cdb9a6}
  .scene .tool-handle{fill:#7a4a22}
  .scene .tool-head{fill:#b9bcc4;stroke:#6c6f78;stroke-width:1}
  .scene .sign-post{fill:rgba(168,85,247,.4)}
  .scene .sign-board{fill:rgba(255,158,0,.16);stroke:var(--text-acc);stroke-width:1.6}
  .scene .sign-stripe{stroke:var(--text-acc);stroke-width:3}

  @keyframes swing{0%,50%{transform:rotate(-55deg)}72%,84%{transform:rotate(-28deg)}100%{transform:rotate(-55deg)}}
  @keyframes sparkpop{0%,64%{opacity:0;transform:scale(.3)}74%{opacity:1;transform:scale(1)}90%{opacity:0;transform:scale(1.3)}100%{opacity:0}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes lowerbeam{0%{transform:translateY(0);opacity:0}12%{opacity:1}66%,84%{transform:translateY(46px);opacity:1}100%{transform:translateY(46px);opacity:0}}
  @keyframes beamglow{0%,100%{opacity:.2}50%{opacity:.42}}
  @keyframes twinkle{0%,100%{opacity:.25}50%{opacity:1}}
  @keyframes sway{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
  @keyframes blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.1)}}

  .scene .hammer-arm{transform-box:fill-box;transform-origin:8% 8%;animation:swing 1.5s ease-in-out infinite}
  .scene .spark{transform-box:fill-box;transform-origin:center;animation:sparkpop 1.5s ease-in-out infinite}
  .scene .ufo{animation:bob 3.1s ease-in-out infinite}
  .scene .girder{transform-box:fill-box;animation:lowerbeam 4.6s ease-in-out infinite}
  .scene .beam{animation:beamglow 3.1s ease-in-out infinite}
  .scene .antleft,.scene .antright{transform-box:fill-box;transform-origin:50% 100%;animation:sway 2.3s ease-in-out infinite}
  .scene .antright{animation-delay:-1.1s}
  .scene .eye-lid{transform-box:fill-box;transform-origin:50% 0;animation:blink 5s ease-in-out infinite}
  .scene .twk.t1{animation:twinkle 2.4s ease-in-out infinite}
  .scene .twk.t2{animation:twinkle 2.9s ease-in-out infinite;animation-delay:-1s}
  .scene .twk.t3{animation:twinkle 2.1s ease-in-out infinite;animation-delay:-.6s}

  @media (prefers-reduced-motion: reduce){
    .scene *{animation:none !important}
    .scene .spark{opacity:0}
  }
</style>
</head>
<body>
<header class="site-nav">
  <div class="nav-inner">
    <a class="logo" href="index.html" aria-label="Sonical home"><img src="sonical-lockup.svg" alt="Sonical" width="151" height="28"></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="coming-soon.html" class="active">About us</a></li>
      <li><a href="/newsroom/">Newsroom</a></li>
      <li><a href="index.html#contact">Talk to us</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="navLinks"><span></span><span></span><span></span></button>
  </div>
</header>

<div class="nebula" aria-hidden="true"></div>
<div class="wrap">
  <p class="eyebrow">Under construction</p>
  <h1>This page is <span class="acc">on its way.</span></h1>

  <div class="scene" aria-hidden="true">
    <svg viewBox="0 0 440 250" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="alienGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#b884f8"/><stop offset="1" stop-color="#7c3aed"/>
        </linearGradient>
      </defs>

      <circle class="twk t1" cx="58" cy="40" r="2"/><circle class="twk t2" cx="392" cy="34" r="2.4"/>
      <circle class="twk t3" cx="300" cy="60" r="1.6"/><circle class="twk t1" cx="150" cy="22" r="1.5"/>
      <line class="ground" x1="24" y1="214" x2="416" y2="214"/>

      <g class="ufo">
        <ellipse class="ufo-dome" cx="222" cy="58" rx="15" ry="11"/>
        <ellipse class="ufo-body" cx="222" cy="68" rx="36" ry="12"/>
        <circle class="ufo-light" cx="206" cy="69" r="2.4"/><circle class="ufo-light" cx="222" cy="72" r="2.4"/><circle class="ufo-light" cx="238" cy="69" r="2.4"/>
        <path class="beam" d="M208 76 L236 76 L254 150 L190 150 Z"/>
        <g class="girder"><rect class="beam-bar" x="198" y="84" width="48" height="10" rx="3"/></g>
      </g>

      <g class="tower">
        <rect class="brick" x="192" y="190" width="40" height="22" rx="3"/>
        <rect class="brick" x="192" y="166" width="40" height="22" rx="3"/>
        <rect class="brick lit" x="192" y="142" width="40" height="22" rx="3"/>
        <rect class="brick ghost" x="192" y="142" width="40" height="22" rx="3"/>
      </g>

      <!-- alien builder (hearing protection on, hammering a nail) -->
      <g class="alien" transform="translate(108,214)">
        <ellipse class="foot" cx="-8" cy="-2" rx="7" ry="4.5"/>
        <ellipse class="foot" cx="8" cy="-2" rx="7" ry="4.5"/>
        <!-- back arm, from the body side -->
        <path class="arm" d="M-12 -25 Q-19 -21 -22 -14"/>
        <ellipse class="body" cx="0" cy="-28" rx="16" ry="21"/>
        <ellipse class="belly" cx="-4" cy="-24" rx="7" ry="11"/>
        <g class="eye-lid">
          <circle class="eye-white" cx="0" cy="-31" r="9"/>
          <circle class="eye-pupil" cx="1.5" cy="-30" r="4.6"/>
          <circle class="eye-glint" cx="-1.2" cy="-33" r="1.9"/>
          <circle class="eye-glint" cx="3" cy="-28.5" r="0.9" opacity=".8"/>
        </g>
        <path class="mouth" d="M-5 -18 q5 4 10 0"/>
        <g class="antleft"><path class="ant" d="M-6 -47 q-4 -8 -9 -12"/><circle class="ant-halo" cx="-16" cy="-60" r="5"/><circle class="ant-bulb" cx="-16" cy="-60" r="3"/></g>
        <g class="antright"><path class="ant" d="M6 -47 q4 -8 9 -12"/><circle class="ant-halo" cx="16" cy="-60" r="5"/><circle class="ant-bulb" cx="16" cy="-60" r="3"/></g>
        <!-- hearing protection (smaller, snug on the head) -->
        <path class="ed-band" d="M-13 -40 a13 13 0 0 1 26 0"/>
        <g><ellipse class="ed-cup" cx="-14" cy="-31" rx="4.5" ry="6"/><ellipse class="ed-foam" cx="-14" cy="-31" rx="2" ry="3"/></g>
        <g><ellipse class="ed-cup" cx="14" cy="-31" rx="4.5" ry="6"/><ellipse class="ed-foam" cx="14" cy="-31" rx="2" ry="3"/></g>

        <!-- plank + nail -->
        <rect class="plank" x="22" y="-6" width="36" height="6" rx="2"/>
        <line class="nail" x1="44" y1="1" x2="44" y2="-4"/>
        <circle class="nail-head" cx="44" cy="-4" r="3"/>

        <!-- hammer held by the HANDLE; metal head taps the nail -->
        <g class="hammer-arm">
          <path class="arm" d="M12 -22 Q18 -20 22 -19"/>
          <circle class="hand" cx="23" cy="-19" r="3.6"/>
          <g transform="rotate(-40 23 -19)">
            <rect class="tool-handle" x="21.5" y="-19" width="3" height="20" rx="1.5"/>
            <rect class="tool-head" x="15" y="-1" width="16" height="8" rx="2"/>
          </g>
        </g>
        <g class="spark" transform="translate(44,-8)">
          <path d="M0 -6 L1.5 -1.5 L6 0 L1.5 1.5 L0 6 L-1.5 1.5 L-6 0 L-1.5 -1.5 Z"/>
        </g>
      </g>

      <g class="sign">
        <rect class="sign-post" x="388" y="184" width="4" height="30"/>
        <rect class="sign-board" x="366" y="168" width="48" height="20" rx="3"/>
        <line class="sign-stripe" x1="372" y1="184" x2="382" y2="172"/>
        <line class="sign-stripe" x1="384" y1="184" x2="394" y2="172"/>
        <line class="sign-stripe" x1="396" y1="184" x2="406" y2="172"/>
      </g>
    </svg>
  </div>

  <p>We&rsquo;re still building out our story. Check back soon, and in the meantime there&rsquo;s plenty to explore on the home page.</p>
  <a class="btn" href="index.html">&larr; Back to home</a>
</div>

<script>
(function () {
  var h = document.querySelector(".site-nav");
  var t = document.getElementById("navToggle");
  var l = document.getElementById("navLinks");
  if (!h || !t || !l) return;
  function close(){ h.classList.remove("nav-open"); t.setAttribute("aria-expanded","false"); }
  t.addEventListener("click", function (e) {
    e.stopPropagation();
    var open = h.classList.toggle("nav-open");
    t.setAttribute("aria-expanded", open ? "true" : "false");
  });
  l.addEventListener("click", function (e) { if (e.target.closest("a")) close(); });
  document.addEventListener("click", function (e) { if (!h.contains(e.target)) close(); });
})();
</script>
</body>
</html>
